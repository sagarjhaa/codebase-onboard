name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Test on self
        run: |
          python -m codebase_onboard . --format json -o /tmp/self-analysis.json
          python -c "import json; d=json.load(open('/tmp/self-analysis.json')); assert d['total_files'] > 0; print(f'✅ Analyzed {d[\"total_files\"]} files')"

      - name: Test on Flask (shallow)
        run: |
          python -m codebase_onboard https://github.com/pallets/flask --depth shallow -o /tmp/flask.md
          test -s /tmp/flask.md && echo "✅ Flask guide generated"

      - name: Test markdown output
        run: |
          python -m codebase_onboard . --format markdown -o /tmp/self.md
          grep -q "Onboarding Guide" /tmp/self.md && echo "✅ Markdown OK"

      - name: Test HTML output
        run: |
          python -m codebase_onboard . --format html -o /tmp/self.html
          grep -q "<html" /tmp/self.html && echo "✅ HTML OK"
